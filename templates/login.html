<!DOCTYPE html>
<html>

<head>

<title>Login Inventario</title>

<style>

body{
font-family:Arial;
background:linear-gradient(to right,#0a1f44,#ffffff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:30px;
border-radius:10px;
width:300px;
box-shadow:0px 0px 15px rgba(0,0,0,0.3);
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px;
}

button{
width:95%;
padding:10px;
background:#0a1f44;
color:white;
border:none;
}

.error{
color:red;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Inventario EDAE</h2>

<form method="POST">

<input name="user" placeholder="Usuario">

<input name="password" type="password" placeholder="Contraseña">

<button type="submit">Ingresar</button>

</form>

{% if error %}

<p class="error">{{error}}</p>

{% endif %}

</div>

</body>

</html>
